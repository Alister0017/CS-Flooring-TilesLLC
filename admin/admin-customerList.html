<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Flooring & Tile LLC | Customers</title>

    <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="admin-body">

    <!-- ================= Sidebar ================= -->

    <aside class="admin-sidebar">

        <div class="admin-brand">
            <h2>CS Flooring</h2>
            <p>Admin Portal</p>
        </div>

        <div class="admin-nav-group">
            <p class="admin-nav-label">Main</p>

            <a href="admin-dashboard.html">Dashboard</a>
        </div>

        <div class="admin-nav-group">
            <p class="admin-nav-label">Operations</p>

            <a class="active" href="admin-customerList.html">Customers</a>
            <a href="admin-jobList.html">Jobs</a>
            <a href="admin-calendar.html">Calendar</a>
        </div>

        <div class="admin-nav-group">
            <p class="admin-nav-label">Documents</p>

            <a href="admin-estimates.html">Estimates</a>
            <a href="admin-agreements.html">Agreements</a>
            <a href="admin-materialCalc.html">Material Calculator</a>
        </div>

        <div class="admin-nav-group">
            <p class="admin-nav-label">Website</p>

            <a href="admin-inventory.html">Inventory</a>
            <a href="admin-photos.html">Photos</a>
            <a href="../index.html">Public Website</a>
        </div>

        <button class="admin-logout" onclick="logoutAdmin()">
            Logout
        </button>

    </aside>

    <!-- ================= Main ================= -->

    <main class="admin-main">

        <header class="admin-dashboard-header">

            <h1 class="admin-business-title">
                CS Flooring & Tile LLC
            </h1>

            <div class="admin-title-row">

                <h1>Customer List</h1>

                <p id="adminCurrentDate"
                   class="admin-current-date"></p>

            </div>

            <nav class="admin-breadcrumb">

                <a href="admin-dashboard.html">
                    Dashboard
                </a>

                <span>/</span>

                <span class="current">
                    Customers
                </span>

            </nav>

        </header>

        <!-- Toolbar -->

        <section class="admin-toolbar">

            <input
                id="customerSearch"
                type="search"
                placeholder="Search customers...">

            <select id="customerSort">

                <option value="name">
                    Name
                </option>

                <option value="recent">
                    Most Recent
                </option>

                <option value="jobs">
                    Most Jobs
                </option>

            </select>

            <button
                class="btn"
                id="newCustomerButton">

                + New Job

            </button>

        </section>

        <!-- Customer Cards -->

        <section
            id="customerGrid"
            class="customer-grid">

            <!-- Generated by customerList.js -->

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../js/supabase-config.js"></script>

    <script src="../js/storage.js"></script>

    <script src="../js/utils.js"></script>

    <script src="../js/admin.js"></script>

    <script src="../js/customerList.js"></script>

    <script src="../js/main.js"></script>

    <script src="../js/auth.js"></script>

</body>

</html>
