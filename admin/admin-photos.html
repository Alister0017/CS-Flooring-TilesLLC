<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Flooring | Photos</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="admin-body">
  <div class="admin-mobile-bar">
    <div class="admin-mobile-brand">
      <strong>CS Flooring</strong>
      <span>Admin Portal</span>
    </div>

    <button class="admin-menu-toggle" type="button" onclick="toggleAdminNav()" aria-label="Open admin menu">
      ☰
    </button>
  </div>

  <div class="admin-sidebar-backdrop" onclick="closeAdminNav()"></div>
  <aside class="admin-sidebar">
    <h2>CS Flooring</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-inventory.html">Inventory</a>
    <a href="admin-customers.html">Customers</a>
    <a href="admin-jobs.html">Jobs</a>
    <a href="admin-calendar.html">Calendar</a>
    <a href="admin-photos.html">Photos</a>
    <a href="admin-documents.html">Documents</a>
    <button class="btn secondary" onclick="logoutAdmin()">Logout</button>
  </aside>

  <main class="admin-main">
    <h1>Update Photos</h1>

    <form id="photoForm" class="form-card admin-form" onsubmit="event.preventDefault(); addPhoto();">
      <label>
        Photo Title
        <input id="photoTitle" type="text" required />
      </label>

      <label>
        Upload Image
        <input id="photoFile" type="file" accept="image/*" required />
      </label>

      <label>
        Description
        <textarea id="photoDescription"></textarea>
      </label>

      <button class="btn" type="submit">Save Photo</button>
    </form>

    <h2>Saved Photos</h2>
    <div id="photos" class="card-grid"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../js/supabase-config.js"></script>

  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>

  <!-- Page-specific JS -->
  <script src="../js/photos.js"></script>
  <!-- or jobs.js, inventory.js, calendar.js, etc. -->

  <script src="../js/main.js"></script>

  <script src="../js/auth.js"></script>

</body>

</html>
