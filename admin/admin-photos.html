  <main class="admin-main">
    <h1>Update Photos</h1>

    <form id="photoForm" class="form-card admin-form" onsubmit="event.preventDefault(); addPhoto();">
      <label>Photo Title<input id="photoTitle" type="text" required /></label>
      <label>Image URL<input id="photoUrl" type="text" required /></label>
      <label>Description<textarea id="photoDescription"></textarea></label>
      <button class="btn" type="submit">Save Photo</button>
    </form>

    <h2>Saved Photos</h2>
    <div id="photos"></div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
