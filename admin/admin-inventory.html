<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Flooring | Inventory</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="admin-body">
  <aside class="admin-sidebar">
    <h2>CS Flooring</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-inventory.html">Inventory</a>
    <a href="admin-customers.html">Customers</a>
    <a href="admin-jobs.html">Jobs</a>
    <a href="admin-calendar.html">Calendar</a>
    <a href="admin-photos.html">Photos</a>
    <a href="admin-documents.html">Documents</a>
    <button class="btn secondary" onclick="logoutAdmin()">Logout</button>
  </aside>

  <main class="admin-main">
    <h1>Inventory</h1>

    <form id="inventoryForm" class="form-card admin-form" onsubmit="event.preventDefault(); addInventoryItem();">
      <label>
        Item Name
        <input id="itemName" type="text" required />
      </label>

      <label>
        Category
        <select id="itemType" required>
          <option value="">Select category</option>
          <option>Subfloor Options</option>
          <option>Luxury Vinyl Products</option>
          <option>Carpet</option>
          <option>VCT</option>
          <option>Trim/Moldings</option>
        </select>
      </label>

      <label>
        Unit Price
        <input id="unitPrice" type="number" step="0.01" required />
      </label>

      <label>
        Quantity
        <input id="quantity" type="number" required />
      </label>

      <label>
        Upload Product Image
        <input id="productFile" type="file" accept="image/*" />
      </label>

      <button class="btn" type="submit">Add Inventory Item</button>
    </form>

    <h2>Current Inventory</h2>
    <div id="inventory"></div>
  </main>

  <script src="../js/auth.js"></script>
  <script>
    protectAdminPage();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/inventory.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
