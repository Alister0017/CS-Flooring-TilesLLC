<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Flooring | Documents</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="admin-body">
  <aside class="admin-sidebar">
    <h2>CS Flooring</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-inventory.html">Inventory</a>
    <a href="admin-customers.html">Customers</a>
    <a href="admin-jobs.html">Jobs</a>
    <a href="admin-calendar.html">Calendar</a>
    <a href="admin-photos.html">Photos</a>
    <a href="admin-documents.html">Documents</a>
    <button class="btn secondary" onclick="logoutAdmin()">Logout</button>
  </aside>

  <main class="admin-main">
    <h1>Owner Estimates & Agreements</h1>

    <h2>Add Owner Estimate</h2>
    <form id="estimateForm" class="form-card admin-form" onsubmit="event.preventDefault(); addEstimate();">
      <label>
        Job Number
        <input id="estimateJobNumber" type="text" placeholder="Example: CS-2026-0001" required />
      </label>

      <label>
        Material Cost
        <input id="materialCost" type="number" step="0.01" required />
      </label>

      <label>
        Labor Cost
        <input id="laborCost" type="number" step="0.01" required />
      </label>

      <label>
        Install Price
        <input id="installPrice" type="number" step="0.01" required />
      </label>

      <button class="btn" type="submit">Save Owner Estimate</button>
    </form>

    <h2>Saved Estimates</h2>
    <div id="estimates"></div>

    <h2>Add Agreement</h2>
    <form id="agreementForm" class="form-card admin-form" onsubmit="event.preventDefault(); addAgreement();">
      <label>
        Job Number
        <input id="agreementJobNumber" type="text" placeholder="Example: CS-2026-0001" required />
      </label>

      <label>
        Agreement Notes
        <textarea id="agreementNotes" required></textarea>
      </label>

      <button class="btn" type="submit">Save Agreement</button>
    </form>

    <h2>Saved Agreements</h2>
    <div id="agreements"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../js/supabase-config.js"></script>

  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>

  <!-- Page-specific JS -->
  <script src="../js/documents.js"></script>
  <!-- or jobs.js, inventory.js, calendar.js, etc. -->

  <script src="../js/main.js"></script>

  <script src="../js/auth.js"></script>
</body>

</html>
