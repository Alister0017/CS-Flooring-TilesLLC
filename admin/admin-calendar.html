<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Flooring | Calendar</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="admin-body">
  <aside class="admin-sidebar">
    <h2>CS Flooring</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-inventory.html">Inventory</a>
    <a href="admin-customers.html">Customers</a>
    <a href="admin-jobs.html">Jobs</a>
    <a href="admin-calendar.html">Calendar</a>
    <a href="admin-photos.html">Photos</a>
    <a href="admin-documents.html">Documents</a>
    <button class="btn secondary" onclick="logoutAdmin()">Logout</button>
  </aside>

  <main class="admin-main">
    <div class="calendar-page-header">
      <div>
        <h1>Calendar</h1>
        <p>View measurement and install schedules.</p>
      </div>
    </div>

    <section class="calendar-shell">
      <div class="calendar-toolbar">
        <button onclick="goToToday()">Today</button>

        <div class="calendar-nav">
          <button onclick="changeMonth(-1)">‹</button>
          <button onclick="changeMonth(1)">›</button>
        </div>

        <h2 id="calendarMonthTitle">Month Year</h2>
      </div>

      <div class="calendar-layout">
        <div class="calendar-main">
          <div class="calendar-weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
          </div>

          <div id="calendarGrid" class="calendar-grid">
            <p>Loading calendar...</p>
          </div>
        </div>

        <aside class="upcoming-panel">
          <h3>Upcoming Events</h3>
          <div id="upcomingEvents"></div>
        </aside>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/calendar.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
