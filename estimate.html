<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Flooring | Estimate</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="logo">CS Flooring</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="gallery.html">Gallery</a>
      <a href="request.html">Request Measurement</a>
      <a href="job-status.html">Job Status</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="section form-page">
    <h1>Estimate Lookup</h1>

    <p>
      Enter your job number and email or phone number to view your estimate information.
    </p>

    <form class="form-card" onsubmit="event.preventDefault(); lookupCustomerDocuments();">
      <label>
        Job Number
        <input id="documentJobNumber" type="text" placeholder="Example: CS-2026-0001" required />
      </label>

      <label>
        Email or Phone
        <input id="documentContactInfo" type="text" placeholder="Email or phone number" required />
      </label>

      <button class="btn" type="submit">View Estimate</button>
    </form>

    <div id="documentResult" class="form-card"></div>
  </main>

  <footer>
    <p>&copy; 2026 CS Flooring.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <script src="js/utils.js"></script>
  <script src="js/documents.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
