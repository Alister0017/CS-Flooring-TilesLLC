<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>CS Flooring | Job Status</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="logo">CS Flooring</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="gallery.html">Gallery</a>
      <a href="request.html">Request Work</a>
      <a href="job-status.html">Job Status</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="section form-page">
    <h1>Check Your Job Status</h1>
    <p>Enter your job number and email/phone to view your project.</p>

    <form class="form-card" onsubmit="event.preventDefault(); lookupJob();">
      <label>
        Job Number
        <input id="jobNumber" type="text" placeholder="Example: CS-2026-0001" required />
      </label>

      <label>
        Email or Phone
        <input id="contactInfo" type="text" placeholder="Email or phone number" />
      </label>

      <button class="btn" type="submit">View Job</button>
    </form>

    <div id="result" class="form-card"></div>
  </main>

  <footer>
    <p>&copy; 2026 CS Flooring.</p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/jobs.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
