<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Flooring | Products</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="logo">CS Flooring</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="gallery.html">Gallery</a>
      <a href="request.html">Request Work</a>
      <a href="job-status.html">Job Status</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="section">
    <h1>Products</h1>
    <p>View available flooring options. These cards can later connect to the database.</p>

    <div class="filters">
      <select>
        <option>Filter by Type</option>
        <option>Hardwood</option>
        <option>Vinyl</option>
        <option>Tile</option>
        <option>Laminate</option>
      </select>

      <select>
        <option>Filter by Price</option>
        <option>Low to High</option>
        <option>High to Low</option>
      </select>
    </div>

    <div class="card-grid">
      <div class="card product-card">
        <div class="placeholder-img">Image</div>
        <h3>Oak Hardwood</h3>
        <p>$8.00 / sq ft</p>
        <button>Favorite</button>
      </div>

      <div class="card product-card">
        <div class="placeholder-img">Image</div>
        <h3>Luxury Vinyl Plank</h3>
        <p>$4.50 / sq ft</p>
        <button>Favorite</button>
      </div>

      <div class="card product-card">
        <div class="placeholder-img">Image</div>
        <h3>Ceramic Tile</h3>
        <p>$6.25 / sq ft</p>
        <button>Favorite</button>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 CS Flooring.</p>
  </footer>

  <script src="js/main.js"></script>
</body>

</html>
