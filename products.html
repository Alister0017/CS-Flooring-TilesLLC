<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Flooring | Products</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header class="site-header">
  <div class="logo">CS Flooring</div>

  <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="Open navigation menu">
    ☰
  </button>

  <nav id="siteNav">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="gallery.html">Gallery</a>
      <a href="request.html">Request Measurement</a>
      <a href="job-status.html">Job Status</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="section">
    <h1>Flooring Options</h1>
    <p>
      Select a category or search by keyword. Final installation pricing is determined by the owner after the free measurement.
    </p>

    <section class="filters">
      <input id="productSearch" type="text" placeholder="Search products..." oninput="filterProducts()" />

      <div class="category-buttons">
        <button onclick="setCategory('All')">All</button>
        <button onclick="setCategory('Subfloor Options')">Subfloor Options</button>
        <button onclick="setCategory('Luxury Vinyl Products')">Luxury Vinyl Products</button>
        <button onclick="setCategory('Carpet')">Carpet</button>
        <button onclick="setCategory('VCT')">VCT</button>
        <button onclick="setCategory('Trim/Moldings')">Trim/Moldings</button>
      </div>
    </section>

    <h2 id="categoryTitle">All Products</h2>

    <div id="productGrid" class="card-grid">
      <p>Loading products...</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 CS Flooring.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <script src="js/utils.js"></script>
  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
