<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Flooring | Request Measurement</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="logo">CS Flooring</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="gallery.html">Gallery</a>
      <a href="request.html">Request Measurement</a>
      <a href="job-status.html">Job Status</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="section form-page">
    <h1>Request a Free Measurement</h1>

    <p>
      All measurements and estimates are free. Submit this form and the owner will contact you to schedule a time
      to measure the space and review the work needed.
    </p>

    <form id="requestForm" class="form-card" onsubmit="event.preventDefault(); submitRequest();">
      <label>
        Name
        <input id="name" type="text" placeholder="Full name" required />
      </label>

      <label>
        Email
        <input id="email" type="email" placeholder="Email address" required />
      </label>

      <label>
        Phone
        <input id="phone" type="tel" placeholder="Phone number" required />
      </label>

      <label>
        Address
        <input id="address" type="text" placeholder="Job address" required />
      </label>

      <label>
        Type of Flooring Work
        <select id="flooringType" required>
          <option value="">Select an option</option>
          <option>Subfloor Options</option>
          <option>Luxury Vinyl Products</option>
          <option>Carpet</option>
          <option>VCT</option>
          <option>Trim/Moldings (Finish Work)</option>
        </select>
      </label>

      <label>
        Room Size / Square Footage
        <input id="squareFootage" type="text" placeholder="Example: 400 sq ft or 12x15 room" />
      </label>

      <label>
        Preferred Measurement Date
        <input id="preferredDate" type="date" />
      </label>

      <label>
        Description of Work Needed
        <textarea id="description" placeholder="Describe the rooms, flooring condition, or work needed" required></textarea>
      </label>

      <button class="btn" type="submit">Submit Measurement Request</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 CS Flooring.</p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/requests.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
